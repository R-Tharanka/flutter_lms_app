name: lms_app
description: A UI-only Learning Management System (LMS) app built with Flutter fundamentals.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:

  uses-material-design: true
  assets:
    - assets/images/

  fonts:
  - family: Inter
    fonts:
      - asset: assets/fonts/Inter_18pt-Regular.ttf
        weight: 400
      - asset: assets/fonts/Inter_18pt-Medium.ttf
        weight: 500
      - asset: assets/fonts/Inter_18pt-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Inter_18pt-Bold.ttf
        weight: 700
      - asset: assets/fonts/Inter_18pt-Italic.ttf
        style: italic